# Real Estate Platform — local development infrastructure
# PostgreSQL + backend (Django) + frontend (Next.js). Backend/frontend run via exec or override command.

services:
  db:
    image: postgres:16-alpine
    container_name: real-estate-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-real_estate_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-real_estate_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app

  # Backend: Django app in ./backend. Run migrations and dev server via exec, e.g.:
  #   docker compose exec backend python manage.py migrate
  #   docker compose exec backend python manage.py runserver 0.0.0.0:8000
  backend:
    build: ./backend
    image: real-estate-backend:latest
    container_name: real-estate-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-real_estate_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      MEDIA_STORAGE: ${MEDIA_STORAGE:-local}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
      MEDIA_URL: ${MEDIA_URL:-/media/}
    depends_on:
      db:
        condition: service_healthy
    # Default: minimal HTTP server so container stays up. Override to run Django, e.g.:
    # command: python manage.py runserver 0.0.0.0:8000
    command: python -m http.server 8000
    networks:
      - app

  # Placeholder only: no Next.js project yet. Keeps container up for infrastructure verification.
  frontend:
    image: node:22-alpine
    container_name: real-estate-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-yandex}
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
    # Placeholder: tiny Node HTTP server on 3000 so container starts without Next.js (infrastructure only).
    command: node -e "require('http').createServer((req,res)=>res.end('OK')).listen(3000)"
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
    name: real-estate-app
